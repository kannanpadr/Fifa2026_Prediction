<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real Penalty Admin - FIFA World Cup 2026</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); }
    .form-control { width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.2); color: white; }
    .btn { background: var(--accent-green); color: black; padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .btn:hover { background: #00c853; }
  </style>
</head>
<body class="bg-portal animate-fade-in">
  <div class="app-container">
    <header class="global-header">
      <div class="header-inner">
        <div class="brand-section">
          <div class="brand-title">FIFA WORLD CUP <span>2026</span></div>
        </div>
        <nav class="navbar">
          <ul class="navbar-nav">
            <li><a href="index.html" class="navbar-link"><span>🏠</span> Dashboard</a></li>
            <li id="navRealPenaltyAdminMenu" style="display: none;"><a href="admin_real_penalty.html" class="navbar-link">⚽ Real Penalty Admin</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="main-content">
      <h1 class="page-title">Real Penalty Score Entry</h1>
      <p class="page-subtitle">Admin interface to enter physical penalty shootout scores.</p>

      <div class="glass-card" style="max-width: 600px; margin: 2rem auto; padding: 2rem;">
        <form id="realPenaltyAdminForm">
          <div class="form-group">
            <label class="form-label">Select User</label>
            <select class="form-control" id="rpUserSelect" required>
              <option value="">Loading users...</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Level</label>
            <select class="form-control" id="rpLevelSelect" required>
              <option value="Easy">Easy (5/3/2/0 pts)</option>
              <option value="Hard">Hard (10/6/3/0 pts)</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Shot 1</label>
            <select class="form-control rp-shot" required></select>
          </div>
          <div class="form-group">
            <label class="form-label">Shot 2</label>
            <select class="form-control rp-shot" required></select>
          </div>
          <div class="form-group">
            <label class="form-label">Shot 3</label>
            <select class="form-control rp-shot" required></select>
          </div>

          <div class="form-group">
            <label class="form-label">
              <input type="checkbox" id="rpTieBreaker"> Is Tie Breaker?
            </label>
          </div>
          <div class="form-group" id="tieBreakerGroup" style="display: none;">
            <label class="form-label">Tie Breaker Shot</label>
            <select class="form-control rp-tie-shot"></select>
          </div>

          <button type="submit" class="btn">Submit Score</button>
        </form>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initRealPenaltyAdmin();
    });
  </script>
</body>
</html>
