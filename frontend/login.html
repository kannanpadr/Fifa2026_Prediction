<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FIFA World Cup 2026 Prediction Portal</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-login animate-fade-in">

  <!-- Background Player Cutouts -->
  <div class="player-bg-left">
    <img src="assets/messi_cutout.png" alt="Messi Background">
  </div>
  <div class="player-bg-right">
    <img src="assets/ronaldo_cutout.png" alt="Ronaldo Background">
  </div>

  <div class="login-wrapper">
    <div class="login-container">

      <!-- Left Graphic Panel -->
      <div class="login-art-panel">
        <!-- Soccer Ball / Cup Icon SVG -->
        <svg class="login-art-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="45" fill="none" stroke="#00e676" stroke-width="2" stroke-dasharray="6,4" />
          <path d="M50 15 L50 85 M15 50 L85 50" stroke="rgba(0, 230, 118, 0.3)" stroke-width="2" />
          <!-- Trophy Icon in the center -->
          <path d="M35 30 H65 V40 C65 50 58 58 50 58 C42 58 35 50 35 40 Z" fill="rgba(0, 230, 118, 0.2)"
            stroke="#00e676" stroke-width="3" />
          <path d="M50 58 V70 M40 70 H60" stroke="#00e676" stroke-width="3" stroke-linecap="round" />
          <path d="M30 35 C25 35 25 45 35 45 M70 35 C75 35 75 45 70 45" stroke="#00e676" stroke-width="2.5"
            fill="none" />
          <!-- Star decorations -->
          <polygon points="50,22 52,26 56,26 53,28 54,32 50,30 46,32 47,28 44,26 48,26" fill="#ffd700" />
        </svg>
        <h1 class="login-art-title">FIFA<br><span style="color:var(--accent-green)">WORLD CUP 2026</span></h1>
        <p class="login-art-tagline">Predict the Score. Be the Champion!</p>
      </div>

      <!-- Right Form Panel -->
      <div class="login-form-panel">

        <!-- Login Form -->
        <div id="loginForm" class="animate-fade-in">
          <div class="form-header">
            <h2 class="form-title">Welcome Back!</h2>
            <p class="form-subtitle">Login to continue to the Prediction Portal</p>
          </div>

          <div id="loginError" style="color:#ff5252; font-size:0.8rem; margin-bottom:1rem; min-height:1.2rem;"></div>

          <form id="loginSubmitForm">
            <div class="form-group">
              <label class="form-label" for="username">Mobile number</label>
              <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input class="form-control" type="text" id="username" placeholder="Enter mobile number" required>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <div class="input-wrapper">
                <span class="input-icon">🔒</span>
                <input class="form-control" type="password" id="password" placeholder="Enter password" required>
                <button class="btn-toggle-password" type="button" id="togglePassword">👁️</button>
              </div>
            </div>

            <div class="form-meta">
              <label class="checkbox-label">
                <input type="checkbox" class="checkbox-input" checked>
                <span>Remember Me</span>
              </label>
              <a href="#" class="form-link">Forgot Password?</a>
            </div>

            <button class="btn btn-primary btn-block btn-lg" type="submit">LOGIN</button>
          </form>

          <p style="text-align:center; font-size:0.85rem; color:var(--text-muted); margin-top:1.5rem;">
            Don't have an account? <a href="#" id="toRegister" class="form-link">Register Now</a>
          </p>

          <div class="divider">Or</div>

          <a href="index.html"
            onclick="localStorage.setItem('fifa_user', JSON.stringify({username:'Admin', role:'admin'}));"
            class="btn btn-outline btn-block">
            <span>🛡️</span> Admin Login
          </a>
        </div>

        <!-- Registration Form (hidden by default) -->
        <div id="registerForm" class="animate-fade-in" style="display: none;">
          <div class="form-header">
            <h2 class="form-title">Join the Game!</h2>
            <p class="form-subtitle">Create your account to submit predictions</p>
          </div>

          <div id="registerError" style="color:#ff5252; font-size:0.8rem; margin-bottom:1rem; min-height:1.2rem;"></div>

          <form id="registerSubmitForm">
            <div class="form-group">
              <label class="form-label" for="regUsername">Username</label>
              <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input class="form-control" type="text" id="regUsername" placeholder="Choose username" required>
              </div>
            </div>


            <div class="form-group">
              <label class="form-label" for="regPhone">Mobile Number</label>
              <div class="input-wrapper">
                <span class="input-icon">📞</span>
                <input class="form-control" type="tel" id="regPhone" placeholder="Enter mobile number" required>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="regPin">6‑digit PIN</label>
              <div class="input-wrapper">
                <span class="input-icon">🔒</span>
                <input class="form-control" type="password" id="regPin" placeholder="Enter 6‑digit PIN" pattern="\d{6}"
                  minlength="6" maxlength="6" required>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="regConfirmPin">Confirm PIN</label>
              <div class="input-wrapper">
                <span class="input-icon">🔒</span>
                <input class="form-control" type="password" id="regConfirmPin" placeholder="Confirm PIN" pattern="\d{6}"
                  minlength="6" maxlength="6" required>
              </div>
            </div>


            <button class="btn btn-primary btn-block btn-lg" type="submit" style="margin-top: 1rem;">REGISTER</button>
          </form>

          <p style="text-align:center; font-size:0.85rem; color:var(--text-muted); margin-top:1.5rem;">
            Already have an account? <a href="#" id="toLogin" class="form-link">Login Now</a>
          </p>
        </div>

      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
